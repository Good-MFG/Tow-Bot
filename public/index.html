<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — Good MFG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-content">
        <svg class="avatar" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="18" fill="#2563EB"/>
          <path d="M18 10c-2.2 0-4 1.8-4 4v1c0 2.2 1.8 4 4 4s4-1.8 4-4v-1c0-2.2-1.8-4-4-4zm-7 16c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1>AI Assistant</h1>
      </div>
    </header>

    <main id="messages"></main>

    <footer id="input-area">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
