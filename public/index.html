<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tow Bot — Good MFG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-content">
        <img class="avatar" src="Tow-Bot-logo.jpg" alt="Tow Bot">
        <h1>Tow Bot</h1>
        <button id="new-chat-btn" aria-label="New conversation" title="New conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="messages">
      <div id="welcome">
        <img class="welcome-logo" src="Tow-Bot-logo.jpg" alt="Tow Bot">
        <h2>Welcome to Tow Bot</h2>
        <p>Ask me anything about Good MFG products and services.</p>
      </div>
    </main>

    <footer id="input-area">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
